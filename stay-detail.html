<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horizon Stays - Detail</title>
    <style>
      :root {
        --bg: #eef4ff;
        --panel: rgba(255, 255, 255, 0.82);
        --border: rgba(141, 177, 230, 0.6);
        --text: #1e2a44;
        --sub: #4d658a;
        --accent: #2f5f9f;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 10%, rgba(163, 197, 245, 0.36), transparent 40%),
          radial-gradient(circle at 90% 0%, rgba(115, 164, 231, 0.3), transparent 42%),
          var(--bg);
        min-height: 100vh;
        padding: 28px;
      }

      .detail {
        max-width: 1080px;
        margin: 0 auto;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 22px;
        overflow: hidden;
        backdrop-filter: blur(10px);
        box-shadow: 0 24px 46px rgba(18, 43, 84, 0.2);
      }

      .hero {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 24px;
        padding: 24px;
      }

      .hero img {
        width: 100%;
        height: 370px;
        object-fit: cover;
        border-radius: 16px;
      }

      .info h1 {
        margin: 0;
        font-size: 34px;
        letter-spacing: -0.3px;
      }

      .location {
        margin-top: 10px;
        color: var(--sub);
        font-size: 17px;
      }

      .meta {
        margin-top: 18px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .tag {
        background: rgba(228, 238, 255, 0.85);
        border: 1px solid rgba(159, 188, 231, 0.8);
        color: #244a83;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
      }

      .description {
        margin-top: 18px;
        color: #2e4570;
        line-height: 1.5;
      }

      .amenities {
        padding: 0 24px 24px;
      }

      .amenities h2 {
        margin: 0 0 12px;
        font-size: 21px;
      }

      .amenities-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(140px, 1fr));
        gap: 10px;
      }

      .amenity {
        background: rgba(241, 248, 255, 0.9);
        border: 1px solid rgba(172, 197, 236, 0.8);
        border-radius: 12px;
        padding: 10px 12px;
        color: #284b81;
      }

      @media (max-width: 900px) {
        body { padding: 14px; }
        .hero {
          grid-template-columns: 1fr;
          padding: 14px;
        }
        .hero img { height: 250px; }
        .info h1 { font-size: 26px; }
        .amenities {
          padding: 0 14px 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="detail" id="detail"></main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("data");
      const detailContainer = document.getElementById("detail");

      if (!raw) {
        detailContainer.innerHTML = "<p style='padding:20px;'>No listing data found.</p>";
      } else {
        try {
          const stay = JSON.parse(decodeURIComponent(raw));
          const amenities = (stay.amenities || [])
            .map((item) => `<div class=\"amenity\">${item}</div>`)
            .join("");

          detailContainer.innerHTML = `
            <section class="hero">
              <img src="${stay.image}" alt="${stay.title}" />
              <div class="info">
                <h1>${stay.title}</h1>
                <div class="location">${stay.location}</div>
                <div class="meta">
                  <span class="tag">${stay.price}</span>
                  <span class="tag">Rating ${stay.rating}</span>
                  <span class="tag">Max guests ${stay.maxGuests}</span>
                  <span class="tag">${stay.sectionTitle || "Stay"}</span>
                </div>
                <p class="description">${stay.description || "A comfortable and curated stay experience."}</p>
              </div>
            </section>
            <section class="amenities">
              <h2>Amenities</h2>
              <div class="amenities-grid">${amenities}</div>
            </section>
          `;
        } catch (error) {
          detailContainer.innerHTML = "<p style='padding:20px;'>Could not load detail information.</p>";
        }
      }
    </script>
  </body>
</html>
